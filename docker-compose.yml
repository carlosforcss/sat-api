services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: satcli
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/satcli
      RUST_LOG: info,chromiumoxide=off
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_PATH: /data/credentials
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    volumes:
      - .:/app:z
      - cargo_target:/cargo-target
      - credentials_data:/data/credentials
      - sat_cli_data:/root/sat-cli
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  cargo_target:
  credentials_data:
  sat_cli_data:
